name: GPS Pipeline CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  AWS_DEFAULT_REGION: us-east-1

jobs:
  # ── 1. Unit tests (no AWS needed) ──────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run unit tests
        run: |
          PYTHONPATH=src pytest \
            tests/test_validate_gps.py \
            tests/test_batch.py \
            tests/test_quality.py \
            -k "not Integration" \
            -v --tb=short

  # ── 2. Integration tests (LocalStack in CI) ─────────────────────────────────
  integration-tests:
    name: Integration Tests (LocalStack)
    runs-on: ubuntu-latest
    needs: unit-tests
    services:
      localstack:
        image: localstack/localstack:3.4
        ports:
          - 4566:4566
        env:
          SERVICES: s3,kinesis,dynamodb,sns,sqs,lambda,glue,iam
          DEBUG: 0
        options: >-
          --health-cmd "curl -f http://localhost:4566/_localstack/health"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 30s

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Bootstrap LocalStack resources
        env:
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_ENDPOINT_URL: http://localhost:4566
        run: bash infra/scripts/bootstrap.sh

      - name: Run integration tests
        env:
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_DEFAULT_REGION: us-east-1
          AWS_ENDPOINT_URL: http://localhost:4566
        run: |
          PYTHONPATH=src pytest tests/test_integration.py tests/test_batch.py \
            -v --tb=short -k "Integration"

  # ── 3. Terraform plan (on PRs, no apply) ────────────────────────────────────
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: unit-tests
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.8.0"

      - name: Terraform Init
        working-directory: infra/terraform
        run: terraform init -backend=false

      - name: Terraform Validate
        working-directory: infra/terraform
        run: terraform validate

      - name: Terraform Plan (LocalStack dry-run)
        working-directory: infra/terraform
        run: terraform plan -var="use_localstack=true" -out=tfplan
        env:
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test

  # ── 4. Package Lambda zips ──────────────────────────────────────────────────
  package-lambdas:
    name: Package Lambdas
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Build Lambda packages
        run: |
          mkdir -p build
          for LAMBDA in validate_gps detect_signal_loss; do
            echo "Packaging $LAMBDA..."
            BUILD_DIR="/tmp/lambda-$LAMBDA"
            mkdir -p "$BUILD_DIR"
            pip install -q --target "$BUILD_DIR" boto3 pandas pyarrow
            cp -r "src/lambdas/$LAMBDA/." "$BUILD_DIR/"
            cp -r "src/lambdas/common" "$BUILD_DIR/common"
            (cd "$BUILD_DIR" && zip -qr "$GITHUB_WORKSPACE/build/${LAMBDA}.zip" .)
            echo "  $(du -sh "build/${LAMBDA}.zip" | cut -f1) → build/${LAMBDA}.zip"
          done
          # Package batch job
          BUILD_DIR="/tmp/lambda-ingest"
          mkdir -p "$BUILD_DIR"
          pip install -q --target "$BUILD_DIR" boto3 pandas pyarrow
          cp -r "src/batch/." "$BUILD_DIR/"
          cp -r "src/lambdas/common" "$BUILD_DIR/common"
          (cd "$BUILD_DIR" && zip -qr "$GITHUB_WORKSPACE/build/ingest_maintenance.zip" .)

      - name: Upload Lambda artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lambda-zips
          path: build/*.zip
          retention-days: 7

  # ── 5. Deploy to AWS (main branch only, requires approval) ─────────────────
  deploy:
    name: Deploy to AWS
    runs-on: ubuntu-latest
    needs: [integration-tests, package-lambdas]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production   # requires manual approval in GitHub Environments
    steps:
      - uses: actions/checkout@v4

      - name: Download Lambda artifacts
        uses: actions/download-artifact@v4
        with:
          name: lambda-zips
          path: build/

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.8.0"

      - name: Terraform Apply (real AWS)
        working-directory: infra/terraform
        run: |
          terraform init
          terraform apply -auto-approve -var="use_localstack=false"
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION:    ${{ env.AWS_DEFAULT_REGION }}

      - name: Deploy Lambda functions
        run: bash infra/scripts/deploy_lambdas.sh
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION:    ${{ env.AWS_DEFAULT_REGION }}
          AWS_ENDPOINT_URL:      ""   # empty = real AWS

      - name: Smoke test — verify resources exist
        run: |
          echo "=== S3 buckets ==="
          aws s3 ls | grep gps-
          echo "=== Kinesis streams ==="
          aws kinesis list-streams --query StreamNames
          echo "=== DynamoDB tables ==="
          aws dynamodb list-tables --query TableNames
          echo "=== Lambda functions ==="
          aws lambda list-functions --query 'Functions[?starts_with(FunctionName, `gps`) || contains(FunctionName, `validate`) || contains(FunctionName, `detect`)].FunctionName'
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION:    ${{ env.AWS_DEFAULT_REGION }}
