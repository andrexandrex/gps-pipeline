services:
  localstack:
    image: localstack/localstack:3.4
    container_name: gps-localstack
    ports:
      - "4566:4566"
    environment:
      - SERVICES=s3,kinesis,lambda,sns,dynamodb,glue,firehose,events,sqs,iam,logs
      - DEBUG=0
      - LAMBDA_EXECUTOR=docker
      - DOCKER_HOST=unix:///var/run/docker.sock
      - AWS_DEFAULT_REGION=us-east-1
      - KINESIS_SHARD_LIMIT=100
      - PERSISTENCE=1
      - LOCALSTACK_VOLUME_DIR=/var/lib/localstack
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
      - "localstack_data:/var/lib/localstack"
      - "./infra/init:/etc/localstack/init/ready.d"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - gps-net

  infra-init:
    image: amazon/aws-cli:2.15.30
    container_name: gps-infra-init
    depends_on:
      localstack:
        condition: service_healthy
    environment:
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_ENDPOINT_URL=http://localstack:4566
    volumes:
      - "./infra/scripts:/scripts"
    entrypoint: ["/bin/bash", "/scripts/bootstrap.sh"]
    networks:
      - gps-net

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: gps-dashboard
    ports:
      - "8501:8501"
    environment:
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_ENDPOINT_URL=http://localstack:4566
      - SILVER_BUCKET=gps-silver
      - GOLD_BUCKET=gps-gold
      - DYNAMO_TABLE_NAME=gps-last-seen
      - SIGNAL_LOSS_THRESHOLD_MINUTES=10
      - PYTHONPATH=/app/src:/app/src/lambdas
    depends_on:
      localstack:
        condition: service_healthy
    volumes:
      - ".:/app"
    command: ["streamlit", "run", "src/dashboard/app.py",
              "--server.address=0.0.0.0", "--server.port=8501"]
    networks:
      - gps-net

volumes:
  localstack_data:

networks:
  gps-net:
    driver: bridge
