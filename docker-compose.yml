services:
  localstack:
    image: localstack/localstack:3.4
    container_name: gps-localstack
    ports:
      - "4566:4566"
    environment:
      - SERVICES=s3,kinesis,lambda,sns,dynamodb,glue,firehose,events,sqs,iam,logs
      - DEBUG=0
      - LAMBDA_EXECUTOR=docker
      - DOCKER_HOST=unix:///var/run/docker.sock
      - AWS_DEFAULT_REGION=us-east-1
      - KINESIS_SHARD_LIMIT=100
      - PERSISTENCE=1
      - LOCALSTACK_VOLUME_DIR=/var/lib/localstack
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
      - "localstack_data:/var/lib/localstack"
      - "./infra/init:/etc/localstack/init/ready.d"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - gps-net

  infra-init:
    image: amazon/aws-cli:2.15.30
    container_name: gps-infra-init
    depends_on:
      localstack:
        condition: service_healthy
    environment:
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_ENDPOINT_URL=http://localstack:4566
    volumes:
      - "./infra/scripts:/scripts"
    entrypoint: ["/bin/bash", "/scripts/bootstrap.sh"]
    networks:
      - gps-net

# Dashboard runs locally via: make dashboard
# (not as Docker container — faster startup, uses .venv Python directly)

volumes:
  localstack_data:

networks:
  gps-net:
    driver: bridge
